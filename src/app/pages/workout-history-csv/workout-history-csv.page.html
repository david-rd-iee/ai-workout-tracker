<app-header
  [title]="pageTitle"
  [showBack]="true"
  [backHref]="backHref"
  [transparent]="true"
  [neoBlend]="true"
></app-header>

<ion-content [fullscreen]="true" class="csv-content">
  <div class="background-gradient"></div>

  <div class="csv-page">
    <div class="csv-controls">
      <ion-item class="type-select" lines="none">
        <ion-label>CSV Table</ion-label>
        <ion-select
          interface="popover"
          [(ngModel)]="selectedType"
          (ionChange)="refreshPreview()"
        >
          <ion-select-option value="Strength">Strength CSV</ion-select-option>
          <ion-select-option value="Cardio">Cardio CSV</ion-select-option>
          <ion-select-option value="Other">Other CSV</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-button
        class="export-button"
        (click)="exportCsv()"
        [disabled]="isLoading || historyGroups.length === 0"
      >
        Export CSV
      </ion-button>
    </div>

    <div class="status-card" *ngIf="isLoading">
      <p>Loading CSV data...</p>
    </div>

    <div class="status-card" *ngIf="!isLoading && historyGroups.length === 0">
      <p>No workout data available. Open this page from Workout History.</p>
    </div>

    <div class="csv-preview-wrap" *ngIf="!isLoading && historyGroups.length > 0">
      <table class="csv-table">
        <thead>
          <tr>
            <th *ngFor="let heading of tableHeaders">{{ heading }}</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of tableRows">
            <td *ngFor="let cell of row">{{ cell }}</td>
          </tr>
          <tr *ngIf="tableRows.length === 0">
            <td class="empty-cell" [attr.colspan]="tableHeaders.length">
              No rows in this table.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</ion-content>
