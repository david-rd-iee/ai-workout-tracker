<ion-menu side="end" type="overlay" [contentId]="contentId" class="analysis-menu">
  <ion-header>
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-menu-toggle>
          <ion-button fill="clear" aria-label="Close analyses menu">
            <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
          </ion-button>
        </ion-menu-toggle>
      </ion-buttons>
      <ion-title>Saved Analyses</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="analysis-menu-content">
    <div class="analysis-list">
      <p class="menu-error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <ng-container *ngIf="!errorMessage">
        <ion-menu-toggle *ngFor="let analysis of workoutAnalyses">
          <button
            type="button"
            class="analysis-item"
            [class.analysis-item--active]="selectedAnalysis?.id === analysis.id"
            (click)="selectAnalysis(analysis)"
          >
            {{ formatSavedAnalysisLabel(analysis) }}
          </button>
        </ion-menu-toggle>

        <p class="menu-empty" *ngIf="!isLoading && workoutAnalyses.length === 0">
          No workout analyses found for this client yet.
        </p>
      </ng-container>
    </div>
  </ion-content>
</ion-menu>

<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button fill="clear" (click)="goBack()" aria-label="Go back">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ clientName || 'Workout Analyzer' }}</ion-title>
    <ion-buttons slot="end">
      <ion-menu-button autoHide="false" aria-label="Open analyses menu"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [id]="contentId" [fullscreen]="false" class="trainer-workout-analyzer-content">
  <ng-container *ngIf="!isLoading; else loadingState">
    <app-video-analysis-viewer
      *ngIf="selectedAnalysis; else emptySelection"
      [analysis]="selectedAnalysis"
      [clientId]="clientId"
      [trainerId]="trainerUid"
      [readonly]="isSelectedAnalysisReadOnly"
      [showTools]="!isSelectedAnalysisReadOnly"
      [showSendToClient]="true"
      [sendToClientLabel]="sendToClientLabel"
      [disableSendToClient]="!canSendToClient"
      (analysisChange)="handleAnalysisChange($event)"
      (requestSendToClient)="sendAnalysisToClient()"
    ></app-video-analysis-viewer>

    <ng-template #emptySelection>
      <div class="hero-card">
        <h1>Workout Analyzer</h1>
        <p *ngIf="clientName">Select a saved analysis for {{ clientName }} from the top-right menu.</p>
        <p *ngIf="!clientName">Select a saved analysis from the top-right menu.</p>
      </div>
    </ng-template>
  </ng-container>

  <ng-template #loadingState>
    <div class="loading-state">
      <ion-spinner name="crescent"></ion-spinner>
      <p>Loading workout analyses...</p>
    </div>
  </ng-template>
</ion-content>
