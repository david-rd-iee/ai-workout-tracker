<ion-content
  [fullscreen]="true"
  class="auth-page-content"
  [scrollY]="!isIOSKeyboardOpen"
  [forceOverscroll]="!isIOSKeyboardOpen"
  [class.keyboard-open]="isIOSKeyboardOpen"
  [style.--ios-keyboard-height.px]="iosKeyboardHeight"
>
  <div class="background-gradient"></div>

  <div class="auth-page-container">
    <section class="auth-hero-card">
      <div class="hero-media-shell">
        <img
          class="hero-runner-image"
          src="assets/auth/runner-figure.webp"
          alt="Running figure"
        />
      </div>

      <div class="hero-copy">
        <p class="hero-eyebrow">ATLAS</p>
        <h1>AI Logger</h1>
        <p>Track workouts, keep momentum, and stay consistent.</p>
      </div>
    </section>

    <section class="auth-form-card">
      <h2>Login</h2>

      <form class="auth-form" (ngSubmit)="onLoginSubmit()">
        <ion-item class="auth-input-item" lines="none">
          <ion-input
            label="Email"
            label-placement="floating"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          ></ion-input>
        </ion-item>

        <ion-item class="auth-input-item" lines="none">
          <ion-input
            label="Password"
            label-placement="floating"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter password"
            autocomplete="current-password"
            required
          ></ion-input>
        </ion-item>

        <ion-text class="auth-error" *ngIf="errorMessage">
          <p>{{ errorMessage }}</p>
        </ion-text>

        <ion-button class="primary-auth-btn" expand="block" type="submit" [disabled]="isSubmitting">
          Login
        </ion-button>
      </form>

      <ion-button
        *ngIf="isIOS"
        class="apple-auth-btn"
        expand="block"
        fill="clear"
        (click)="loginWithApple()"
        [disabled]="isSubmitting"
      >
        <ion-icon name="logo-apple" slot="start"></ion-icon>
        Sign in with Apple
      </ion-button>

      <p class="auth-switch-copy">
        New here?
        <a routerLink="/sign-up">Create an account</a>
      </p>
    </section>
  </div>
</ion-content>
