<app-header
  [title]="'Analyzed Workouts'"
  [hideTitle]="true"
  [showBack]="true"
  [backHref]="'/camera'"
  [neoBlend]="true"
></app-header>

<ion-content [fullscreen]="true" class="analyzed-videos-content">
  <div class="background-gradient"></div>

  <div class="analyzed-videos-page">
    <section class="videos-hero">
      <p class="hero-eyebrow">Workout Review</p>
      <h1>Your analyzed videos.</h1>
      <p class="hero-copy">
        Open any analyzed workout to review your recording, overlay, and coach notes.
      </p>
    </section>

    <section class="videos-shell" *ngIf="!isLoading; else loadingState">
      <h2>Videos</h2>

      <div class="message-card" *ngIf="errorMessage; else listState">
        <p>{{ errorMessage }}</p>
      </div>

      <ng-template #listState>
        <div class="videos-list" *ngIf="analyzedVideos.length; else emptyState">
          <button
            type="button"
            class="video-item"
            *ngFor="let video of analyzedVideos"
            (click)="openAnalysis(video)"
          >
            <span class="video-copy">{{ video.label }}</span>
            <span class="video-item-icon" aria-hidden="true">
              <ion-icon name="chevron-forward-outline"></ion-icon>
            </span>
          </button>
        </div>
      </ng-template>

      <ng-template #emptyState>
        <div class="empty-state">
          <ion-icon name="analytics-outline"></ion-icon>
          <p>No analyzed workouts have been shared with you yet.</p>
        </div>
      </ng-template>
    </section>

    <ng-template #loadingState>
      <div class="loading-state">
        <ion-spinner name="crescent"></ion-spinner>
        <p>Loading analyzed workouts...</p>
      </div>
    </ng-template>
  </div>
</ion-content>
