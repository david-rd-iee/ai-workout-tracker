<!-- src/app/pages/tabs/tabs.page.html -->
<ion-tabs>
  <ion-tab-bar *ngIf="showTabBar" slot="bottom" color="primary">
    <ng-container *ngIf="isDemoMode; else normalTabs">
      <ion-tab-button tab="home" routerDirection="root">
        <ion-icon name="home-outline"></ion-icon>
        <ion-label>Home</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="leaderboard" routerDirection="root" href="/regional-leaderboard">
        <ion-icon name="trophy-outline"></ion-icon>
        <ion-label>Leaderboard</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="profile" routerDirection="root" href="/profile-user">
        <ion-icon name="person-outline"></ion-icon>
        <ion-label>Profile</ion-label>
      </ion-tab-button>
    </ng-container>

    <ng-template #normalTabs>
      <ion-tab-button tab="home" routerDirection="root">
        <ion-icon name="home-outline"></ion-icon>
        <ion-label>Home</ion-label>
      </ion-tab-button>

      <ion-tab-button
        tab="calender"
        routerDirection="root"
        [href]="calendarHref"
        (click)="onCalendarTabClick($event)"
      >
        <ion-icon name="calendar-outline"></ion-icon>
        <ion-label>Calendar</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="chats" routerDirection="root">
        <ion-icon name="chatbubble-ellipses-sharp"></ion-icon>
        <ion-label>Chats</ion-label>
      </ion-tab-button>
    </ng-template>
  </ion-tab-bar>
</ion-tabs>
