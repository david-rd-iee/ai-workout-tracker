<ion-content
  [fullscreen]="true"
  class="auth-page-content"
  [scrollY]="!isIOSKeyboardOpen"
  [forceOverscroll]="!isIOSKeyboardOpen"
  [class.keyboard-open]="isIOSKeyboardOpen"
  [style.--ios-keyboard-height.px]="iosKeyboardHeight"
>
  <div class="background-gradient"></div>

  <div class="auth-page-container">
    <section class="auth-hero-card">
      <div class="hero-media-shell">
        <img
          class="hero-runner-image"
          src="assets/auth/runner-figure.webp"
          alt="Running figure"
        />
      </div>

      <div class="hero-copy">
        <p class="hero-eyebrow">ATLAS</p>
        <h1>Create Profile</h1>
        <p>Build your account and start logging your training.</p>
      </div>
    </section>

    <section class="auth-form-card">
      <h2>Sign Up</h2>

      <form class="auth-form" (ngSubmit)="onSignupSubmit()">
        <ion-item class="auth-input-item" lines="none">
          <ion-input
            label="First Name"
            label-placement="floating"
            type="text"
            [(ngModel)]="firstName"
            name="firstName"
            placeholder="First name"
            autocomplete="given-name"
            required
          ></ion-input>
        </ion-item>

        <ion-item class="auth-input-item" lines="none">
          <ion-input
            label="Last Name"
            label-placement="floating"
            type="text"
            [(ngModel)]="lastName"
            name="lastName"
            placeholder="Last name"
            autocomplete="family-name"
            required
          ></ion-input>
        </ion-item>

        <ion-item class="auth-input-item" lines="none">
          <ion-input
            label="Email"
            label-placement="floating"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          ></ion-input>
        </ion-item>

        <ion-item class="auth-input-item" lines="none">
          <ion-input
            label="Age"
            label-placement="floating"
            type="number"
            inputmode="numeric"
            [(ngModel)]="age"
            name="age"
            placeholder="Age"
            required
          ></ion-input>
        </ion-item>

        <ion-item class="auth-input-item" lines="none">
          <ion-select
            label="Sex"
            label-placement="floating"
            [(ngModel)]="sex"
            name="sex"
            interface="popover"
            placeholder="Select sex"
            required
          >
            <ion-select-option *ngFor="let option of sexOptions" [value]="option.value">
              {{ option.label }}
            </ion-select-option>
          </ion-select>
        </ion-item>

        <ion-item class="auth-input-item" lines="none">
          <ion-input
            label="Height (m)"
            label-placement="floating"
            type="number"
            inputmode="decimal"
            [(ngModel)]="heightMeters"
            name="heightMeters"
            placeholder="e.g. 1.78"
            required
          ></ion-input>
        </ion-item>

        <ion-item class="auth-input-item" lines="none">
          <ion-input
            label="Weight (kg)"
            label-placement="floating"
            type="number"
            inputmode="decimal"
            [(ngModel)]="weightKg"
            name="weightKg"
            placeholder="e.g. 72"
            required
          ></ion-input>
        </ion-item>

        <p class="profile-hint">These stats help Atlas estimate your effort score during setup.</p>

        <ion-item class="auth-input-item" lines="none">
          <ion-input
            label="Password"
            label-placement="floating"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Create password"
            autocomplete="new-password"
            required
          ></ion-input>
        </ion-item>

        <ion-item class="auth-input-item" lines="none">
          <ion-input
            label="Confirm Password"
            label-placement="floating"
            type="password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Repeat password"
            autocomplete="new-password"
            required
          ></ion-input>
        </ion-item>

        <p *ngIf="passwordMismatch" class="error-message">Passwords do not match.</p>

        <ion-text class="auth-error" *ngIf="errorMessage">
          <p>{{ errorMessage }}</p>
        </ion-text>

        <ion-button
          class="primary-auth-btn"
          expand="block"
          type="submit"
          [disabled]="passwordMismatch || isSubmitting"
        >
          Sign Up
        </ion-button>
      </form>

      <p class="auth-switch-copy">
        Already have an account?
        <a routerLink="/login">Login</a>
      </p>
    </section>
  </div>
</ion-content>
